<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Arrow Escape Puzzle</title>
    <style>
      /* Reset default padding/margin */
      html, body {
        padding: 0;
        margin: 0;
        width: 100%;
        height: 100%;
        background-color: #1a1a1a;
        overflow: hidden;
      }

      /* Container covers the full browser window */
      #unity-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Canvas maintains 9:16 aspect ratio */
      #unity-canvas {
        width: 100%;
        height: 100%;
        /* 
           Logic: 
           - Chieu rong toi da la 100% man hinh hoac ti le 9:16 so voi chieu cao.
           - Chieu cao toi da la 100% man hinh hoac ti le 16:9 so voi chieu rong.
        */
        max-width: calc(100vh * (9 / 16));
        max-height: calc(100vw * (16 / 9));
        aspect-ratio: 9 / 16;
        
        background: #231f20;
        box-shadow: 0px 0px 30px rgba(0,0,0,0.7);
      }

      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
        font-family: sans-serif;
      }

      #progress-bar-empty {
        width: 200px;
        height: 10px;
        background: #444;
        border-radius: 5px;
        margin-top: 10px;
        overflow: hidden;
      }

      #progress-bar-full {
        width: 0%;
        height: 100%;
        background: #00ff88;
        transition: width 0.2s;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
      <div id="unity-loading-bar">
        <div id="loading-text">LOADING GAME...</div>
        <div id="progress-bar-empty">
          <div id="progress-bar-full"></div>
        </div>
      </div>
    </div>

    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/BuildVercel.loader.js";
      var config = {
        dataUrl: buildUrl + "/BuildVercel.data",
        frameworkUrl: buildUrl + "/BuildVercel.framework.js",
        codeUrl: buildUrl + "/BuildVercel.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Arrow Escape Puzzle",
        productVersion: "1.0",
      };

      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#progress-bar-full");

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
